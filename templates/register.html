{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card" style="max-width: 380px; border-left: 4px solid #38b2ac;">
    <div class="card-body">
        <h1 class="h5 mb-4" style="color: #2d3748;">Register</h1>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <p class="mt-3 mb-0 text-muted small">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
