{% extends "base.html" %}
{% block title %}Upload Excel{% endblock %}
{% block content %}
<h1 class="h4 mb-4">Upload Excel File</h1>
<p class="text-muted mb-4">Expected columns: narrative_number, dataset, Review1, Review2, braided_narrative, gt_trust, gpt_trust</p>
<div class="card" style="border-left: 4px solid #4a90d9;">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Excel file (.xlsx)</label>
                <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
            </div>
            <button type="submit" class="btn btn-primary">Upload</button>
        </form>
    </div>
</div>
<p class="mt-3"><a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back to dashboard</a></p>
{% endblock %}
